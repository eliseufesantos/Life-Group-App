openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication (invite + magic link)
  - name: members
    description: Members and guests
  - name: discipleship
    description: Discipleship relationships
  - name: calendar
    description: Calendar (recurring weekly meeting + free events)
  - name: board
    description: Mural (announcements, polls, weekly tasks, photos, albums)
  - name: registros
    description: Meeting records (attendance, activities, donations) with leader approval flow
  - name: storage
    description: Object storage upload and serving endpoints
  - name: campaigns
    description: Donation campaigns (money/items, aggregated items only, no donor identity)
  - name: reports
    description: Consolidated reports (on-demand + monthly) with CSV export
  - name: push
    description: Web Push (VAPID) subscriptions
  - name: notifications
    description: In-app notifications
  - name: cell
    description: Cell configuration (name, photo)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/invites:
    get:
      operationId: listInvites
      tags: [auth]
      summary: List invite codes created by the leader/auxiliary
      responses:
        "200":
          description: List of invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"
    post:
      operationId: createInvite
      tags: [auth]
      summary: Generate a new single-use invite code (valid 24h) for a named person
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteInput"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/invites/{code}:
    get:
      operationId: validateInvite
      tags: [auth]
      summary: Validate an invite code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteValidation"
        "404":
          description: Invalid or expired invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/register:
    post:
      operationId: registerWithInvite
      tags: [auth]
      summary: Register a new member using an invite code, then receive a magic link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Magic link sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicLinkResult"
        "400":
          description: Invalid input or invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/magic-link:
    post:
      operationId: requestMagicLink
      tags: [auth]
      summary: Request a magic link for an existing account (login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkInput"
      responses:
        "200":
          description: Magic link sent (always returns success to avoid email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicLinkResult"

  /auth/verify:
    post:
      operationId: verifyMagicLink
      tags: [auth]
      summary: Verify a magic link token and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyInput"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out of the current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members and guests
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by record status
          schema:
            type: string
            enum: [member, guest, all]
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createGuest
      tags: [members]
      summary: Register a guest (informational record, no login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestInput"
      responses:
        "201":
          description: Guest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/import:
    post:
      operationId: importMembers
      tags: [members]
      summary: Bulk import members from CSV rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get a member by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a member's attributes (role, categories, formation track, contact)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Remove a member or guest record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /members/{id}/promote:
    post:
      operationId: promoteGuest
      tags: [members]
      summary: Promote a guest to member (reuses existing profile)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteInput"
      responses:
        "200":
          description: Promoted member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/stats:
    get:
      operationId: getMemberStats
      tags: [members]
      summary: Aggregate member/guest counts and conversion rate
      responses:
        "200":
          description: Member stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberStats"

  /discipleship:
    get:
      operationId: listDiscipleships
      tags: [discipleship]
      summary: List all discipleship relationships
      responses:
        "200":
          description: List of relationships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Discipleship"
    post:
      operationId: createDiscipleship
      tags: [discipleship]
      summary: Create a discipler to disciple relationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscipleshipInput"
      responses:
        "201":
          description: Relationship created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discipleship"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /discipleship/{id}:
    patch:
      operationId: updateDiscipleship
      tags: [discipleship]
      summary: Update discipleship progress notes or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscipleshipUpdate"
      responses:
        "200":
          description: Updated relationship
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discipleship"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteDiscipleship
      tags: [discipleship]
      summary: Remove a discipleship relationship
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /calendar/recurrence:
    get:
      operationId: getRecurrence
      tags: [calendar]
      summary: Get the weekly meeting recurrence configuration
      responses:
        "200":
          description: Recurrence config (null fields if not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurrenceConfig"
    put:
      operationId: setRecurrence
      tags: [calendar]
      summary: Configure the weekly meeting (day, time, location)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurrenceInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurrenceConfig"

  /calendar/next-meeting:
    get:
      operationId: getNextMeeting
      tags: [calendar]
      summary: Get the next weekly meeting occurrence (with overrides applied)
      responses:
        "200":
          description: Next meeting info (configured=false if recurrence not set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextMeeting"

  /calendar/events:
    get:
      operationId: listCalendarEvents
      tags: [calendar]
      summary: List calendar events in a period (generated meeting occurrences + free events)
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      responses:
        "200":
          description: Events in the period
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [calendar]
      summary: Create a free event (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /calendar/events/{id}:
    patch:
      operationId: updateEvent
      tags: [calendar]
      summary: Update a free event (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteEvent
      tags: [calendar]
      summary: Delete a free event (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /calendar/occurrences/{date}:
    put:
      operationId: overrideOccurrence
      tags: [calendar]
      summary: Adjust a single weekly meeting occurrence (time/location/cancel) without changing the recurrence
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OccurrenceOverrideInput"
      responses:
        "200":
          description: Occurrence override saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "400":
          description: Date is not a meeting occurrence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: clearOccurrenceOverride
      tags: [calendar]
      summary: Remove the override of a meeting occurrence (restore default recurrence)
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      responses:
        "200":
          description: Override removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/announcements:
    get:
      operationId: listAnnouncements
      tags: [board]
      summary: List announcements (newest first)
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [board]
      summary: Publish an announcement (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /board/announcements/{id}:
    patch:
      operationId: updateAnnouncement
      tags: [board]
      summary: Edit an announcement's title/body (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementUpdate"
      responses:
        "200":
          description: Updated announcement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAnnouncement
      tags: [board]
      summary: Delete an announcement (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/polls:
    get:
      operationId: listPolls
      tags: [board]
      summary: List polls with options, vote counts and my vote
      responses:
        "200":
          description: Polls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Poll"
    post:
      operationId: createPoll
      tags: [board]
      summary: Create a poll (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PollInput"
      responses:
        "201":
          description: Poll created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"

  /board/polls/{id}/vote:
    post:
      operationId: votePoll
      tags: [board]
      summary: Vote in a poll (one vote per member, changing is allowed while open)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteInput"
      responses:
        "200":
          description: Vote registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"
        "400":
          description: Poll closed or invalid option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /board/polls/{id}/close:
    post:
      operationId: closePoll
      tags: [board]
      summary: Close a poll (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Poll closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"

  /board/polls/{id}:
    delete:
      operationId: deletePoll
      tags: [board]
      summary: Delete a poll (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/tasks:
    get:
      operationId: listTasks
      tags: [board]
      summary: List weekly tasks
      parameters:
        - name: weekStart
          in: query
          required: false
          description: Filter by week (date of Monday). Defaults to current week.
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskItem"
    post:
      operationId: createTask
      tags: [board]
      summary: Create a weekly task (leader creates approved; auxiliary creates a proposal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"

  /board/tasks/{id}/approve:
    post:
      operationId: approveTask
      tags: [board]
      summary: Approve a proposed task (leader only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"
        "403":
          description: Leader only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /board/tasks/{id}/done:
    post:
      operationId: completeTask
      tags: [board]
      summary: Mark a task as done (assignee or leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"

  /board/tasks/{id}:
    delete:
      operationId: deleteTask
      tags: [board]
      summary: Delete a task (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/photos:
    get:
      operationId: listPhotos
      tags: [board]
      summary: List meeting photos (newest first)
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      operationId: createPhoto
      tags: [board]
      summary: Register an uploaded meeting photo (any member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoInput"
      responses:
        "201":
          description: Photo registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"

  /board/photos/{id}:
    delete:
      operationId: deletePhoto
      tags: [board]
      summary: Delete a photo (uploader or leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/albums:
    get:
      operationId: listAlbums
      tags: [board]
      summary: List photo albums with linked event and photo count (newest first)
      responses:
        "200":
          description: Albums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Album"
    post:
      operationId: createAlbum
      tags: [board]
      summary: Create a photo album (any member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumInput"
      responses:
        "201":
          description: Album created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /board/albums/{id}:
    patch:
      operationId: updateAlbum
      tags: [board]
      summary: Update an album (creator or leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlbumUpdate"
      responses:
        "200":
          description: Updated album
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Album"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAlbum
      tags: [board]
      summary: Delete an album, keeping its photos unlinked (creator or leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
