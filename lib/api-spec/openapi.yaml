openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication (invite + magic link)
  - name: members
    description: Members and guests
  - name: discipleship
    description: Discipleship relationships
  - name: calendar
    description: Calendar (recurring weekly meeting + free events)
  - name: board
    description: Mural (announcements, polls, weekly tasks, photos)
  - name: storage
    description: Object storage upload and serving endpoints
  - name: campaigns
    description: Donation campaigns (money/items, aggregated items only, no donor identity)
  - name: reports
    description: Consolidated reports (on-demand + monthly) with CSV export
  - name: push
    description: Web Push (VAPID) subscriptions
  - name: notifications
    description: In-app notifications
  - name: cell
    description: Cell configuration (name, photo)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/invites:
    get:
      operationId: listInvites
      tags: [auth]
      summary: List invite codes created by the leader/auxiliary
      responses:
        "200":
          description: List of invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invite"
    post:
      operationId: createInvite
      tags: [auth]
      summary: Generate a new single-use invite code (valid 24h)
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invite"

  /auth/invites/{code}:
    get:
      operationId: validateInvite
      tags: [auth]
      summary: Validate an invite code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteValidation"
        "404":
          description: Invalid or expired invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/register:
    post:
      operationId: registerWithInvite
      tags: [auth]
      summary: Register a new member using an invite code, then receive a magic link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Magic link sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicLinkResult"
        "400":
          description: Invalid input or invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/magic-link:
    post:
      operationId: requestMagicLink
      tags: [auth]
      summary: Request a magic link for an existing account (login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkInput"
      responses:
        "200":
          description: Magic link sent (always returns success to avoid email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MagicLinkResult"

  /auth/verify:
    post:
      operationId: verifyMagicLink
      tags: [auth]
      summary: Verify a magic link token and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyInput"
      responses:
        "200":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out of the current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members and guests
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by record status
          schema:
            type: string
            enum: [member, guest, all]
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createGuest
      tags: [members]
      summary: Register a guest (informational record, no login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestInput"
      responses:
        "201":
          description: Guest created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/import:
    post:
      operationId: importMembers
      tags: [members]
      summary: Bulk import members from CSV rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberImportInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get a member by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a member's attributes (role, categories, formation track, contact)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Remove a member or guest record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /members/{id}/promote:
    post:
      operationId: promoteGuest
      tags: [members]
      summary: Promote a guest to member (reuses existing profile)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteInput"
      responses:
        "200":
          description: Promoted member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetail"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/stats:
    get:
      operationId: getMemberStats
      tags: [members]
      summary: Aggregate member/guest counts and conversion rate
      responses:
        "200":
          description: Member stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberStats"

  /discipleship:
    get:
      operationId: listDiscipleships
      tags: [discipleship]
      summary: List all discipleship relationships
      responses:
        "200":
          description: List of relationships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Discipleship"
    post:
      operationId: createDiscipleship
      tags: [discipleship]
      summary: Create a discipler to disciple relationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscipleshipInput"
      responses:
        "201":
          description: Relationship created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discipleship"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /discipleship/{id}:
    patch:
      operationId: updateDiscipleship
      tags: [discipleship]
      summary: Update discipleship progress notes or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscipleshipUpdate"
      responses:
        "200":
          description: Updated relationship
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Discipleship"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteDiscipleship
      tags: [discipleship]
      summary: Remove a discipleship relationship
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /calendar/recurrence:
    get:
      operationId: getRecurrence
      tags: [calendar]
      summary: Get the weekly meeting recurrence configuration
      responses:
        "200":
          description: Recurrence config (null fields if not configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurrenceConfig"
    put:
      operationId: setRecurrence
      tags: [calendar]
      summary: Configure the weekly meeting (day, time, location)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurrenceInput"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurrenceConfig"

  /calendar/next-meeting:
    get:
      operationId: getNextMeeting
      tags: [calendar]
      summary: Get the next weekly meeting occurrence (with overrides applied)
      responses:
        "200":
          description: Next meeting info (configured=false if recurrence not set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextMeeting"

  /calendar/events:
    get:
      operationId: listCalendarEvents
      tags: [calendar]
      summary: List calendar events in a period (generated meeting occurrences + free events)
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      responses:
        "200":
          description: Events in the period
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEvent"
    post:
      operationId: createEvent
      tags: [calendar]
      summary: Create a free event (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /calendar/events/{id}:
    patch:
      operationId: updateEvent
      tags: [calendar]
      summary: Update a free event (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteEvent
      tags: [calendar]
      summary: Delete a free event (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /calendar/occurrences/{date}:
    put:
      operationId: overrideOccurrence
      tags: [calendar]
      summary: Adjust a single weekly meeting occurrence (time/location/cancel) without changing the recurrence
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OccurrenceOverrideInput"
      responses:
        "200":
          description: Occurrence override saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
        "400":
          description: Date is not a meeting occurrence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: clearOccurrenceOverride
      tags: [calendar]
      summary: Remove the override of a meeting occurrence (restore default recurrence)
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      responses:
        "200":
          description: Override removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/announcements:
    get:
      operationId: listAnnouncements
      tags: [board]
      summary: List announcements (newest first)
      responses:
        "200":
          description: Announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [board]
      summary: Publish an announcement (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /board/announcements/{id}:
    delete:
      operationId: deleteAnnouncement
      tags: [board]
      summary: Delete an announcement (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/polls:
    get:
      operationId: listPolls
      tags: [board]
      summary: List polls with options, vote counts and my vote
      responses:
        "200":
          description: Polls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Poll"
    post:
      operationId: createPoll
      tags: [board]
      summary: Create a poll (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PollInput"
      responses:
        "201":
          description: Poll created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"

  /board/polls/{id}/vote:
    post:
      operationId: votePoll
      tags: [board]
      summary: Vote in a poll (one vote per member, changing is allowed while open)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteInput"
      responses:
        "200":
          description: Vote registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"
        "400":
          description: Poll closed or invalid option
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /board/polls/{id}/close:
    post:
      operationId: closePoll
      tags: [board]
      summary: Close a poll (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Poll closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Poll"

  /board/polls/{id}:
    delete:
      operationId: deletePoll
      tags: [board]
      summary: Delete a poll (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/tasks:
    get:
      operationId: listTasks
      tags: [board]
      summary: List weekly tasks
      parameters:
        - name: weekStart
          in: query
          required: false
          description: Filter by week (date of Monday). Defaults to current week.
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskItem"
    post:
      operationId: createTask
      tags: [board]
      summary: Create a weekly task (leader creates approved; auxiliary creates a proposal)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"

  /board/tasks/{id}/approve:
    post:
      operationId: approveTask
      tags: [board]
      summary: Approve a proposed task (leader only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"
        "403":
          description: Leader only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /board/tasks/{id}/done:
    post:
      operationId: completeTask
      tags: [board]
      summary: Mark a task as done (assignee or leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task done
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskItem"

  /board/tasks/{id}:
    delete:
      operationId: deleteTask
      tags: [board]
      summary: Delete a task (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /board/photos:
    get:
      operationId: listPhotos
      tags: [board]
      summary: List meeting photos (newest first)
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      operationId: createPhoto
      tags: [board]
      summary: Register an uploaded meeting photo (any member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoInput"
      responses:
        "201":
          description: Photo registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"

  /board/photos/{id}:
    delete:
      operationId: deletePhoto
      tags: [board]
      summary: Delete a photo (uploader or leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /storage/objects/{objectPath}:
    get:
      operationId: getStorageObject
      tags: [storage]
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed with correct Content-Type
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns (newest first)
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a campaign (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignInput"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}:
    patch:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update a campaign (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignUpdate"
      responses:
        "200":
          description: Updated campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /campaigns/{id}/close:
    post:
      operationId: closeCampaign
      tags: [campaigns]
      summary: Close a campaign (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/items:
    get:
      operationId: listCampaignItems
      tags: [campaigns]
      summary: List aggregated donated items of a campaign (no donor identity)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CampaignItem"
    post:
      operationId: addCampaignItem
      tags: [campaigns]
      summary: Register donated items in aggregate (leader/auxiliary, never donor identity)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignItemInput"
      responses:
        "201":
          description: Item registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignItem"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /campaigns/{id}/items/{itemId}:
    delete:
      operationId: deleteCampaignItem
      tags: [campaigns]
      summary: Remove a registered item entry (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List generated reports (leader/auxiliary)
      responses:
        "200":
          description: Reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReportSummary"

  /reports/generate:
    post:
      operationId: generateReport
      tags: [reports]
      summary: Generate a consolidated report on demand (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportGenerateInput"
      responses:
        "201":
          description: Report generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a report with full data (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a report (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /reports/{id}/csv:
    get:
      operationId: exportReportCsv
      tags: [reports]
      summary: Export a report as CSV (leader/auxiliary)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /push/public-key:
    get:
      operationId: getPushPublicKey
      tags: [push]
      summary: Get the VAPID public key for browser push subscription
      responses:
        "200":
          description: Public key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushPublicKey"

  /push/subscribe:
    post:
      operationId: subscribePush
      tags: [push]
      summary: Register the browser push subscription for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscribeInput"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /push/unsubscribe:
    post:
      operationId: unsubscribePush
      tags: [push]
      summary: Remove a push subscription for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushUnsubscribeInput"
      responses:
        "200":
          description: Unsubscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List my in-app notifications (newest first, latest 50)
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppNotification"

  /notifications/read-all:
    post:
      operationId: markNotificationsRead
      tags: [notifications]
      summary: Mark all my notifications as read
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"

  /cell:
    get:
      operationId: getCellConfig
      tags: [cell]
      summary: Get the cell configuration (name, photo)
      responses:
        "200":
          description: Cell configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CellConfig"
    put:
      operationId: updateCellConfig
      tags: [cell]
      summary: Update the cell configuration (leader/auxiliary)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CellConfigInput"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CellConfig"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OkResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    MagicLinkResult:
      type: object
      properties:
        sent:
          type: boolean
        devLink:
          type: ["string", "null"]
          description: In development, the magic link URL for convenience
      required:
        - sent

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [leader, auxiliary, member]
        categories:
          type: array
          items:
            type: string
            enum: [host, discipler, disciple]
        formationTrack:
          type: ["string", "null"]
      required:
        - id
        - name
        - role
        - categories

    Invite:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        createdAt:
          type: string
        expiresAt:
          type: string
        used:
          type: boolean
      required:
        - id
        - code
        - createdAt
        - expiresAt
        - used

    InviteValidation:
      type: object
      properties:
        valid:
          type: boolean
      required:
        - valid

    RegisterInput:
      type: object
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
      required:
        - code
        - name
        - email

    MagicLinkInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    VerifyInput:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
        - token

    Member:
      type: object
      description: Member row. Contact/formation fields are only populated for leader/auxiliary viewers.
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        status:
          type: string
          enum: [member, guest]
        role:
          type: ["string", "null"]
          enum: [leader, auxiliary, member, null]
        categories:
          type: array
          items:
            type: string
            enum: [host, discipler, disciple]
        formationTrack:
          type: ["string", "null"]
        invitedBy:
          type: ["string", "null"]
        joinedAt:
          type: ["string", "null"]
        active:
          type: boolean
      required:
        - id
        - name
        - status
        - categories
        - active

    MemberDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        status:
          type: string
          enum: [member, guest]
        role:
          type: ["string", "null"]
          enum: [leader, auxiliary, member, null]
        categories:
          type: array
          items:
            type: string
            enum: [host, discipler, disciple]
        formationTrack:
          type: ["string", "null"]
        invitedBy:
          type: ["string", "null"]
        joinedAt:
          type: ["string", "null"]
        active:
          type: boolean
        disciples:
          type: array
          items:
            $ref: "#/components/schemas/Discipleship"
        disciplers:
          type: array
          items:
            $ref: "#/components/schemas/Discipleship"
      required:
        - id
        - name
        - status
        - categories
        - active
        - disciples
        - disciplers

    GuestInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
        invitedBy:
          type: string
      required:
        - name

    PromoteInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    MemberUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [leader, auxiliary, member]
        categories:
          type: array
          items:
            type: string
            enum: [host, discipler, disciple]
        formationTrack:
          type: string
        active:
          type: boolean

    MemberImportInput:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/MemberImportRow"
      required:
        - rows

    MemberImportRow:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        formationTrack:
          type: string
      required:
        - name

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
      required:
        - imported
        - skipped

    MemberStats:
      type: object
      properties:
        totalMembers:
          type: integer
        totalGuests:
          type: integer
        totalDisciplers:
          type: integer
        totalHosts:
          type: integer
        conversionRate:
          type: number
      required:
        - totalMembers
        - totalGuests
        - totalDisciplers
        - totalHosts
        - conversionRate

    Discipleship:
      type: object
      properties:
        id:
          type: integer
        disciplerId:
          type: integer
        disciplerName:
          type: string
        discipleId:
          type: integer
        discipleName:
          type: string
        startDate:
          type: string
        status:
          type: string
          enum: [active, paused, completed]
        notes:
          type: ["string", "null"]
      required:
        - id
        - disciplerId
        - disciplerName
        - discipleId
        - discipleName
        - startDate
        - status

    DiscipleshipInput:
      type: object
      properties:
        disciplerId:
          type: integer
        discipleId:
          type: integer
        notes:
          type: string
      required:
        - disciplerId
        - discipleId

    DiscipleshipUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [active, paused, completed]
        notes:
          type: string

    RecurrenceConfig:
      type: object
      properties:
        configured:
          type: boolean
        weekday:
          type: ["integer", "null"]
          description: 0 = Sunday ... 6 = Saturday
        time:
          type: ["string", "null"]
          description: HH:mm (24h)
        location:
          type: ["string", "null"]
      required:
        - configured
        - weekday
        - time
        - location

    RecurrenceInput:
      type: object
      properties:
        weekday:
          type: integer
          minimum: 0
          maximum: 6
        time:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        location:
          type: string
      required:
        - weekday
        - time

    NextMeeting:
      type: object
      properties:
        configured:
          type: boolean
        date:
          type: ["string", "null"]
          description: Date (YYYY-MM-DD) of the next non-canceled occurrence
        time:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        overridden:
          type: boolean
      required:
        - configured
        - date
        - time
        - location
        - overridden

    CalendarEvent:
      type: object
      properties:
        id:
          type: ["integer", "null"]
          description: Null for generated meeting occurrences without override
        type:
          type: string
          enum: [meeting, free]
        title:
          type: string
        category:
          type: ["string", "null"]
        date:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        time:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        canceled:
          type: boolean
        overridden:
          type: boolean
          description: True when a meeting occurrence has a one-off adjustment
      required:
        - id
        - type
        - title
        - date
        - time
        - location
        - canceled
        - overridden

    EventInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        date:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        time:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        location:
          type: string
        description:
          type: string
      required:
        - title
        - category
        - date

    EventUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        date:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        time:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        location:
          type: string
        description:
          type: string

    OccurrenceOverrideInput:
      type: object
      properties:
        time:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        location:
          type: string
        canceled:
          type: boolean

    Announcement:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        authorName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - title
        - body
        - authorName
        - createdAt

    AnnouncementInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string
          minLength: 1
      required:
        - title
        - body

    PollOption:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        votes:
          type: integer
      required:
        - id
        - text
        - votes

    Poll:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        closed:
          type: boolean
        options:
          type: array
          items:
            $ref: "#/components/schemas/PollOption"
        myVote:
          type: ["integer", "null"]
          description: Option id the current user voted for
        totalVotes:
          type: integer
        authorName:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - question
        - closed
        - options
        - myVote
        - totalVotes
        - authorName
        - createdAt

    PollInput:
      type: object
      properties:
        question:
          type: string
          minLength: 1
        options:
          type: array
          minItems: 2
          items:
            type: string
            minLength: 1
      required:
        - question
        - options

    VoteInput:
      type: object
      properties:
        optionId:
          type: integer
      required:
        - optionId

    TaskItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        weekStart:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        assignedTo:
          type: ["integer", "null"]
        assigneeName:
          type: ["string", "null"]
        status:
          type: string
          enum: [proposed, approved, done]
        proposedByName:
          type: ["string", "null"]
        doneAt:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - title
        - weekStart
        - assignedTo
        - assigneeName
        - status
        - proposedByName
        - doneAt
        - createdAt

    TaskInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        weekStart:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        assignedTo:
          type: integer
      required:
        - title
        - weekStart

    Photo:
      type: object
      properties:
        id:
          type: integer
        objectPath:
          type: string
        url:
          type: string
          description: Relative serving URL for the photo
        caption:
          type: ["string", "null"]
        uploaderName:
          type: ["string", "null"]
        uploadedBy:
          type: ["integer", "null"]
        createdAt:
          type: string
      required:
        - id
        - objectPath
        - url
        - caption
        - uploaderName
        - uploadedBy
        - createdAt

    PhotoInput:
      type: object
      properties:
        objectPath:
          type: string
          minLength: 1
        caption:
          type: string
      required:
        - objectPath

    UploadUrlRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name
        size:
          type: integer
          minimum: 1
          description: File size in bytes
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. image/jpeg)
      required:
        - name
        - size
        - contentType

    UploadUrlResponse:
      type: object
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload
        objectPath:
          type: string
          description: Normalized object path (e.g. /objects/uploads/uuid)
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"
      required:
        - uploadURL
        - objectPath

    Campaign:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [money, items, both]
        startDate:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        endDate:
          type: ["string", "null"]
        externalLink:
          type: ["string", "null"]
          description: Link to an external donation ministry (shown as link/QR code)
        status:
          type: string
          enum: [active, closed]
        createdByName:
          type: ["string", "null"]
        itemCount:
          type: integer
          description: Number of aggregated item entries registered
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - type
        - startDate
        - endDate
        - externalLink
        - status
        - createdByName
        - itemCount
        - createdAt

    CampaignInput:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        type:
          type: string
          enum: [money, items, both]
        startDate:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        endDate:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        externalLink:
          type: string
      required:
        - title
        - type
        - startDate

    CampaignUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        type:
          type: string
          enum: [money, items, both]
        startDate:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        endDate:
          type: ["string", "null"]
        externalLink:
          type: ["string", "null"]

    CampaignItem:
      type: object
      description: Aggregated item entry. Donor identity is never collected or stored.
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        itemName:
          type: string
        quantity:
          type: integer
        unit:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - campaignId
        - itemName
        - quantity
        - unit
        - createdAt

    CampaignItemInput:
      type: object
      properties:
        itemName:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 1
        unit:
          type: string
      required:
        - itemName
        - quantity

    ReportSummary:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [monthly, on_demand]
        periodStart:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        periodEnd:
          type: string
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        createdByName:
          type: ["string", "null"]
          description: Null when generated automatically
        createdAt:
