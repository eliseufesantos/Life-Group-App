components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OkResult:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    MagicLinkResult:
      type: object
      properties:
        sent:
          type: boolean
        devLink:
          type: ["string", "null"]
          description: In development, the magic link URL for convenience
      required:
        - sent

    CurrentUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [leader, auxiliary, member]
        categories:
          type: array
          items:
            type: string
            enum: [host, discipler, disciple]
        formationTrack:
          type: ["string", "null"]
      required:
        - id
        - name
        - role
        - categories

    Invite:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
          description: Name of the invited person
        createdAt:
          type: string
        expiresAt:
          type: string
        used:
          type: boolean
      required:
        - id
        - code
        - name
        - createdAt
        - expiresAt
        - used

    InviteInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          description: Name of the invited person
      required:
        - name

    InviteValidation:
      type: object
      properties:
        valid:
          type: boolean
      required:
        - valid

    RegisterInput:
      type: object
      properties:
        code:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
      required:
        - code
        - name
        - email

    MagicLinkInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    VerifyInput:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
        - token

    Member:
      type: object
      description: Member row. Contact/formation fields are only populated for leader/auxiliary viewers.
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        status:
          type: string
          enum: [member, guest]
        role:
          type: ["string", "null"]
          enum: [leader, auxiliary, member, null]
        categories:
          type: array
          items:
            type: string
            enum: [host, discipler, disciple]
        formationTrack:
          type: ["string", "null"]
        birthDate:
          type: ["string", "null"]
          description: Birth date (YYYY-MM-DD)
        avatarPath:
          type: ["string", "null"]
          description: Object path of the profile picture
        invitedBy:
          type: ["string", "null"]
        joinedAt:
          type: ["string", "null"]
        active:
          type: boolean
      required:
        - id
        - name
        - status
        - categories
        - birthDate
        - avatarPath
        - active

    MemberDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        status:
          type: string
          enum: [member, guest]
        role:
          type: ["string", "null"]
          enum: [leader, auxiliary, member, null]
        categories:
          type: array
          items:
            type: string
            enum: [host, discipler, disciple]
        formationTrack:
          type: ["string", "null"]
        birthDate:
          type: ["string", "null"]
          description: Birth date (YYYY-MM-DD)
        avatarPath:
          type: ["string", "null"]
          description: Object path of the profile picture
        invitedBy:
          type: ["string", "null"]
        joinedAt:
          type: ["string", "null"]
        active:
          type: boolean
        disciples:
          type: array
          items:
            $ref: "#/components/schemas/Discipleship"
        disciplers:
          type: array
          items:
            $ref: "#/components/schemas/Discipleship"
      required:
        - id
        - name
        - status
        - categories
        - birthDate
        - avatarPath
        - active
        - disciples
        - disciplers

    GuestInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
        invitedBy:
          type: string
      required:
        - name

    PromoteInput:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
        - email

    MemberUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [leader, auxiliary, member]
        categories:
          type: array
          items:
            type: string
            enum: [host, discipler, disciple]
        formationTrack:
          type: string
        birthDate:
          type: ["string", "null"]
          description: Birth date (YYYY-MM-DD), null clears it
        avatarPath:
          type: ["string", "null"]
          description: Object path of the profile picture, null clears it
        active:
          type: boolean

    MemberImportInput:
      type: object
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/MemberImportRow"
      required:
        - rows

    MemberImportRow:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        formationTrack:
          type: string
      required:
        - name

    ImportResult:
      type: object
      properties:
        imported:
          type: integer
        skipped:
          type: integer
      required:
        - imported
        - skipped

    MemberStats:
      type: object
      properties:
        totalMembers:
          type: integer
        totalGuests:
          type: integer
        totalDisciplers:
          type: integer
        totalHosts:
          type: integer
        conversionRate:
          type: number
      required:
        - totalMembers
        - totalGuests
        - totalDisciplers
        - totalHosts
        - conversionRate

    Discipleship:
      type: object
      description: |
        Each side is either an internal member (id set) or an external person
        from another Life Group (external name set). At least one side is
        internal. disciplerName/discipleName always carry the display name.
      properties:
        id:
          type: integer
        disciplerId:
          type: ["integer", "null"]
        disciplerName:
          type: string
        externalDisciplerName:
          type: ["string", "null"]
          description: Free-text name when the discipler is from another Life Group
        discipleId:
          type: ["integer", "null"]
        discipleName:
          type: string
        externalDiscipleName:
          type: ["string", "null"]
          description: Free-text name when the disciple is from another Life Group
        startDate:
          type: string
        status:
          type: string
          enum: [active, paused, completed]
        notes:
          type: ["string", "null"]
      required:
        - id
        - disciplerId
        - disciplerName
        - externalDisciplerName
        - discipleId
        - discipleName
        - externalDiscipleName
        - startDate
        - status

    DiscipleshipInput:
      type: object
      description: |
        For each side provide exactly one of the internal id or the external
        name. At least one side must be an internal member.
      properties:
        disciplerId:
          type: integer
        externalDisciplerName:
          type: string
          minLength: 1
        discipleId:
          type: integer
        externalDiscipleName:
          type: string
          minLength: 1
        notes:
          type: string

    DiscipleshipUpdate:
      type: object
      description: |
        Sides may be reassigned; when changing a side, provide exactly one of
        the internal id or the external name for it. At least one side must
        remain an internal member.
      properties:
        disciplerId:
          type: ["integer", "null"]
        externalDisciplerName:
          type: ["string", "null"]
        discipleId:
          type: ["integer", "null"]
        externalDiscipleName:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, paused, completed]
        notes:
          type: string

    RecurrenceConfig:
      type: object
      properties:
        configured:
          type: boolean
        weekday:
          type: ["integer", "null"]
          description: 0 = Sunday ... 6 = Saturday
        time:
          type: ["string", "null"]
          description: HH:mm (24h)
        location:
          type: ["string", "null"]
      required:
        - configured
        - weekday
        - time
        - location

    RecurrenceInput:
      type: object
      properties:
        weekday:
          type: integer
          minimum: 0
          maximum: 6
        time:
          type: string
          pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
        location:
          type: string
      required:
        - weekday
        - time

    NextMeeting:
      type: object
      properties:
        configured:
          type: boolean
        date:
          type: ["string", "null"]
